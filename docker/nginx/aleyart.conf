# /etc/nginx/conf.d/aleyart.conf
# ALEYART EXAMAI PRO — Nginx Configuration

server {
    listen 80;
    server_name app.aleyartacademy.edu.gh www.app.aleyartacademy.edu.gh;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.aleyartacademy.edu.gh;

    # SSL — replace with your actual certificate paths
    ssl_certificate     /etc/ssl/certs/aleyart/fullchain.pem;
    ssl_certificate_key /etc/ssl/certs/aleyart/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_comp_level 6;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    client_max_body_size 10m;

    # React frontend (static files)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Static assets (long cache)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy → Node.js backend
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://aleyart_api:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Auth endpoints — stricter rate limit
    location /api/auth/login {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://aleyart_api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Uploads (passports, logos)
    location /uploads/ {
        proxy_pass http://aleyart_api:5000;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Health check
    location /health {
        proxy_pass http://aleyart_api:5000;
        access_log off;
    }
}
